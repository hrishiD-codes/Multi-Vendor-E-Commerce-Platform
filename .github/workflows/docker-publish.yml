      - name: Extract short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/notification-service
          dockerfile: ./backend/services/notification-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/notification-service:latest
            ${{ env.DOCKERHUB_USERNAME }}/notification-service:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push — frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Extract short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          dockerfile: ./frontend/Dockerfile
          push: true
          build-args: |
             NEXT_PUBLIC_USER_SERVICE_URL=http://${{ secrets.AWS_EC2_HOST }}
             NEXT_PUBLIC_PRODUCT_SERVICE_URL=http://${{ secrets.AWS_EC2_HOST }}
             NEXT_PUBLIC_CART_SERVICE_URL=http://${{ secrets.AWS_EC2_HOST }}
             NEXT_PUBLIC_ORDER_SERVICE_URL=http://${{ secrets.AWS_EC2_HOST }}
             NEXT_PUBLIC_PAYMENT_SERVICE_URL=http://${{ secrets.AWS_EC2_HOST }}
             NEXT_PUBLIC_NOTIFICATION_SERVICE_URL=http://${{ secrets.AWS_EC2_HOST }}
             NEXTAUTH_URL=http://${{ secrets.AWS_EC2_HOST }}:3000
             NEXTAUTH_SECRET=changeme
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/ekart-frontend:latest
            ${{ env.DOCKERHUB_USERNAME }}/ekart-frontend:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Deployment Job (Runs after all builds succeed)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - build-api-gateway
      - build-user-service
      - build-product-catalog-service
      - build-shopping-cart-service
      - build-order-service
      - build-payment-service
      - build-notification-service
      - build-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/Multi-Vendor-E-Commerce-Platform"

      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Multi-Vendor-E-Commerce-Platform
            # Pull latest images from Docker Hub
            sudo docker compose pull
            # Start/Update containers in background
            sudo docker compose up -d --remove-orphans
            # Cleanup unused images to save disk space
            sudo docker image prune -f
