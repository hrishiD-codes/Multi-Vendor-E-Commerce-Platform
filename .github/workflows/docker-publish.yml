      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/order-service
          dockerfile: ./backend/services/order-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/order-service:latest
            ${{ env.DOCKERHUB_USERNAME }}/order-service:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-payment-service:
    name: Build & Push — payment-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Extract short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/payment-service
          dockerfile: ./backend/services/payment-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/payment-service:latest
            ${{ env.DOCKERHUB_USERNAME }}/payment-service:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-notification-service:
    name: Build & Push — notification-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
