          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Extract short SHA
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/shopping-cart-service
          dockerfile: ./backend/services/shopping-cart-service/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/shopping-cart-service:latest
            ${{ env.DOCKERHUB_USERNAME }}/shopping-cart-service:${{ steps.vars.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-order-service:
    name: Build & Push — order-service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
