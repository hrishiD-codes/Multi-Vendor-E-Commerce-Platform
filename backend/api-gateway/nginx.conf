user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20M;

    # ─── Rate Limiting Zones ──────────────────────────────────────────────────
    # General API limit — 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    # Auth endpoints stricter — 30 req/min per IP (enough for real users; brute-force protected by burst queue)
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=30r/m;
    # Webhook endpoints — unlimited (Stripe/PayPal call these)
    limit_req_zone $binary_remote_addr zone=api_webhooks:1m rate=120r/m;

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ─── Include Virtual Host ─────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
