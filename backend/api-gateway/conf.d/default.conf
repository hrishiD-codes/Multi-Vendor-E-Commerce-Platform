# ─── Upstream Service Definitions ────────────────────────────────────────────
# Each service runs on its own port (or container hostname in Docker).
# In Docker Compose the hostname matches the service name.

upstream user_service {
    server user-service:8000;
    keepalive 16;
}

upstream product_catalog_service {
    server product-catalog-service:8002;
    keepalive 16;
}

upstream shopping_cart_service {
    server shopping-cart-service:8003;
    keepalive 16;
}

upstream order_service {
    server order-service:8004;
    keepalive 16;
}

upstream payment_service {
    server payment-service:8005;
    keepalive 16;
}

upstream notification_service {
    server notification-service:8006;
    keepalive 16;
}

# ─── CORS Helper Map ─────────────────────────────────────────────────────────
map $http_origin $cors_origin {
    ~^https?://(localhost:3000|localhost:3001)$ $http_origin;
    default "";
}

# ─── Main Server Block ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # CORS preflight — handle OPTIONS globally so every service doesn't need to
    if ($request_method = OPTIONS) {
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
        add_header 'Access-Control-Max-Age'       1728000 always;
        add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
        add_header 'Content-Length'               0 always;
        return 204;
    }

    # CORS response headers for all regular requests
    add_header 'Access-Control-Allow-Origin'  $cors_origin always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;

    # ─── Proxy common settings (shared by all locations via include) ──────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Connection        "";
    proxy_connect_timeout   10s;
    proxy_send_timeout      30s;
    proxy_read_timeout      30s;

    # ─── Global Health Check ──────────────────────────────────────────────────
    location = /health {
        return 200 '{"gateway":"ok","time":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # =========================================================================
    # USER SERVICE  (port 8001)
    # Routes: /api/auth/*, /api/users/*, /api/admin/users
    # =========================================================================

    # Auth endpoints — stricter rate limiting
    location ~ ^/api/auth/(register|login|forgot-password|reset-password)$ {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://user_service;
    }

    location /api/auth/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://user_service;
    }

    location /api/users/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://user_service;
    }

    # User admin
    location /api/admin/users {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://user_service;
    }

    # =========================================================================
    # PRODUCT CATALOG SERVICE  (port 8002)
    # Routes: /api/products/*, /api/categories/*, /api/admin/products/*,
    #         /api/admin/categories/*, /api/admin/inventory/*
    # =========================================================================

    location /api/products/ {
        limit_req zone=api_general burst=60 nodelay;
        proxy_pass http://product_catalog_service;
    }

    location /api/categories/ {
        limit_req zone=api_general burst=60 nodelay;
        proxy_pass http://product_catalog_service;
    }

    location /api/admin/products {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://product_catalog_service;
    }

    location /api/admin/categories {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://product_catalog_service;
    }

    location /api/admin/inventory {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://product_catalog_service;
    }

    # =========================================================================
    # SHOPPING CART SERVICE  (port 8003)
    # Routes: /api/cart/*
    # Injects X-User-Id from $http_authorization via auth_request (see below)
    # =========================================================================

    location /api/cart/ {
        limit_req zone=api_general burst=30 nodelay;

        # Forward the raw Authorization header — the service reads X-User-Id
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://shopping_cart_service;
    }

    # =========================================================================
    # ORDER SERVICE  (port 8004)
    # Routes: /api/orders/*, /api/admin/orders/*
    # =========================================================================

    location /api/orders/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://order_service;
    }

    location /api/admin/orders {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://order_service;
    }

    # =========================================================================
    # PAYMENT SERVICE  (port 8005)
    # Routes: /api/payments/*, /api/webhooks/*, /api/admin/payments/*
    # Webhooks get a relaxed rate limit (external callers)
    # =========================================================================

    location /api/webhooks/ {
        limit_req zone=api_webhooks burst=20 nodelay;
        proxy_pass http://payment_service;
    }

    location /api/payments/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_set_header Authorization $http_authorization;
        proxy_pass http://payment_service;
    }

    location /api/admin/payments {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://payment_service;
    }

    # =========================================================================
    # NOTIFICATION SERVICE  (port 8006)
    # Routes: /api/notifications/*
    # =========================================================================

    location /api/notifications/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://notification_service;
    }

    # =========================================================================
    # PER-SERVICE HEALTH CHECKS
    # =========================================================================

    location = /api/health/users         { proxy_pass http://user_service/api/health; }
    location = /api/health/products      { proxy_pass http://product_catalog_service/api/health; }
    location = /api/health/cart          { proxy_pass http://shopping_cart_service/api/health; }
    location = /api/health/orders        { proxy_pass http://order_service/api/health; }
    location = /api/health/payments      { proxy_pass http://payment_service/api/health; }
    location = /api/health/notifications { proxy_pass http://notification_service/api/health; }

    # ─── Catch-all 404 for unmapped routes ───────────────────────────────────
    location /api/ {
        return 404 '{"error":"Route not found on gateway"}';
        add_header Content-Type application/json;
    }

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         DENY    always;
    add_header X-XSS-Protection        "1; mode=block" always;
}
