# ─── CORS Helper Map ─────────────────────────────────────────────────────────
map $http_origin $cors_origin {
    ~^https?://(localhost:3000|localhost:3001)$ $http_origin;
    "https://squaremart.vercel.app" $http_origin;
    default "";
}

# ─── Main Server Block ────────────────────────────────────────────────────────
server {
    # PORT is injected at container start via envsubst (local=80, Render=10000)
    listen ${PORT};
    server_name localhost;

    # Docker/Render Internal DNS resolver
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # ─── Service URL Variables ──────────────────────────────────────────────
    # These are populated by envsubst from environment variables at startup.
    # Local docker-compose: http://user-service:8000 etc.
    # Render production:    https://user-service-xxxx.onrender.com etc.
    set $user_service_url          "${USER_SERVICE_URL}";
    set $product_service_url       "${PRODUCT_SERVICE_URL}";
    set $cart_service_url          "${CART_SERVICE_URL}";
    set $order_service_url         "${ORDER_SERVICE_URL}";
    set $payment_service_url       "${PAYMENT_SERVICE_URL}";
    set $notification_service_url  "${NOTIFICATION_SERVICE_URL}";
    set $frontend_url              "${FRONTEND_URL}";

    # ─── Proxy common settings (shared by all locations via include) ──────────
    proxy_http_version      1.1;
    proxy_set_header        Host              $proxy_host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto $scheme;
    proxy_set_header        Connection        "";
    # Identification card for microservices to verify Gateway origin
    proxy_set_header        X-Gateway-Secret  "ecommerce-internal-secret-2024";

    # Render free-plan services can take 50s+ to wake from cold-start
    proxy_connect_timeout   60s;
    proxy_send_timeout      90s;
    proxy_read_timeout      90s;
    proxy_ssl_server_name on;

    # ─── Global Health Check ──────────────────────────────────────────────────
    location = /gateway-check {
        add_header Content-Type application/json;
        return 200 '{"gateway":"ok","environment":"docker"}';
    }

    # ─── Frontend Proxy ───────────────────────────────────────────────────────
    location / {
        proxy_pass $frontend_url;
    }

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"gateway":"ok","time":"$time_iso8601"}';
    }

    # =========================================================================
    # USER SERVICE
    # Routes: /api/auth/*, /api/users/*, /api/admin/users
    # =========================================================================

    # Auth endpoints — stricter rate limiting
    location ~ ^/api/auth/(register|login|forgot-password|reset-password)$ {
        # burst=20 allows up to 20 queued requests — prevents instant 503 during cold-start retries
        limit_req zone=api_auth burst=20;

        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }

        proxy_pass $user_service_url;
    }

    location /api/auth/ {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_pass $user_service_url;
    }

    location /api/users/ {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_pass $user_service_url;
    }

    # User admin
    location /api/admin/users {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_pass $user_service_url;
    }

    # =========================================================================
    # PRODUCT CATALOG SERVICE
    # Routes: /api/products/*, /api/categories/*, /api/admin/products/*,
    #         /api/admin/categories/*, /api/admin/inventory/*
    # =========================================================================

    location /api/products/ {
        limit_req zone=api_general burst=60 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_pass $product_service_url;
    }

    location /api/categories/ {
        limit_req zone=api_general burst=60 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_pass $product_service_url;
    }

    location /api/admin/products {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_pass $product_service_url;
    }

    location /api/admin/categories {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_pass $product_service_url;
    }

    location /api/admin/inventory {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_pass $product_service_url;
    }

    # =========================================================================
    # SHOPPING CART SERVICE
    # Routes: /api/cart/*
    # =========================================================================

    location /api/cart/ {
        limit_req zone=api_general burst=30 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }

        # Forward the raw Authorization header — the service reads X-User-Id
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Gateway-Secret "ecommerce-internal-secret-2024";
        proxy_pass $cart_service_url;
    }

    # =========================================================================
    # ORDER SERVICE
    # Routes: /api/orders/*, /api/admin/orders/*
    # =========================================================================

    location /api/orders/ {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Gateway-Secret "ecommerce-internal-secret-2024";
        proxy_pass $order_service_url;
    }

    location /api/admin/orders {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_set_header X-Gateway-Secret "ecommerce-internal-secret-2024";
        proxy_pass $order_service_url;
    }

    # =========================================================================
    # PAYMENT SERVICE
    # Routes: /api/payments/*, /api/webhooks/*, /api/admin/payments/*
    # Webhooks get a relaxed rate limit (external callers)
    # =========================================================================

    location /api/webhooks/ {
        limit_req zone=api_webhooks burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        # Webhooks usually don't need the secret as they are external, 
        # but let's be consistent if they match the internal pattern.
        proxy_pass $payment_service_url;
    }

    location /api/payments/ {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Gateway-Secret "ecommerce-internal-secret-2024";
        proxy_pass $payment_service_url;
    }

    location /api/admin/payments {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_set_header X-Gateway-Secret "ecommerce-internal-secret-2024";
        proxy_pass $payment_service_url;
    }

    # =========================================================================
    # NOTIFICATION SERVICE
    # Routes: /api/notifications/*
    # =========================================================================

    location /api/notifications/ {
        limit_req zone=api_general burst=20 nodelay;
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-User-Id, X-Session-Id' always;
            add_header 'Access-Control-Max-Age'       1728000 always;
            add_header 'Content-Type'                 'text/plain; charset=UTF-8' always;
            add_header 'Content-Length'               0 always;
            return 204;
        }
        proxy_pass $notification_service_url;
    }

    # =========================================================================
    # PER-SERVICE HEALTH CHECKS
    # =========================================================================

    location = /api/health/users         { proxy_pass $user_service_url/api/health; }
    location = /api/health/products      { proxy_pass $product_service_url/api/health; }
    location = /api/health/cart          { proxy_pass $cart_service_url/api/health; }
    location = /api/health/orders        { proxy_pass $order_service_url/api/health; }
    location = /api/health/payments      { proxy_pass $payment_service_url/api/health; }
    location = /api/health/notifications { proxy_pass $notification_service_url/api/health; }

    # ─── Catch-all 404 for unmapped routes ───────────────────────────────────
    location /api/ {
        add_header 'Access-Control-Allow-Origin'  $cors_origin always;
        add_header Content-Type application/json;
        return 404 '{"error":"Route not found on gateway"}';
    }

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff always;
    add_header X-Frame-Options         DENY    always;
    add_header X-XSS-Protection        "1; mode=block" always;
}
