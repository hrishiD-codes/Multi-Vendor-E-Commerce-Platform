version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# E-Kart — Multi-Vendor E-Commerce Platform
# Docker Compose: all 6 backend services + NGINX gateway + PostgreSQL + Frontend
# ─────────────────────────────────────────────────────────────────────────────

networks:
  ecommerce:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # ───────────────────────────────────────────────────────────────────────────
  # Shared Infrastructure
  # ───────────────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ───────────────────────────────────────────────────────────────────────────
  # Microservices
  # ───────────────────────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./backend/services/user-service
      dockerfile: Dockerfile
    container_name: ecommerce_user_service
    env_file:
      - .env
    environment:
      PORT: "8000"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce
    restart: always

  product-catalog-service:
    build:
      context: ./backend/services/product-catalog-service
      dockerfile: Dockerfile
    container_name: ecommerce_product_service
    env_file:
      - .env
    environment:
      PORT: "8002"
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce
    restart: always

  shopping-cart-service:
    build:
      context: ./backend/services/shopping-cart-service
      dockerfile: Dockerfile
    container_name: ecommerce_cart_service
    env_file:
      - .env
    environment:
      PORT: "8003"
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce
    restart: always

  order-service:
    build:
      context: ./backend/services/order-service
      dockerfile: Dockerfile
    container_name: ecommerce_order_service
    env_file:
      - .env
    environment:
      PORT: "8004"
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce
    restart: always

  payment-service:
    build:
      context: ./backend/services/payment-service
      dockerfile: Dockerfile
    container_name: ecommerce_payment_service
    env_file:
      - .env
    environment:
      PORT: "8005"
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce
    restart: always

  notification-service:
    build:
      context: ./backend/services/notification-service
      dockerfile: Dockerfile
    container_name: ecommerce_notification_service
    env_file:
      - .env
    environment:
      PORT: "8006"
    ports:
      - "8006:8006"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce
    restart: always

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend (Next.js)
  # ───────────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_USER_SERVICE_URL: ${NEXT_PUBLIC_USER_SERVICE_URL:-http://localhost}
        NEXT_PUBLIC_PRODUCT_SERVICE_URL: ${NEXT_PUBLIC_PRODUCT_SERVICE_URL:-http://localhost}
        NEXT_PUBLIC_CART_SERVICE_URL: ${NEXT_PUBLIC_CART_SERVICE_URL:-http://localhost}
        NEXT_PUBLIC_ORDER_SERVICE_URL: ${NEXT_PUBLIC_ORDER_SERVICE_URL:-http://localhost}
        NEXT_PUBLIC_PAYMENT_SERVICE_URL: ${NEXT_PUBLIC_PAYMENT_SERVICE_URL:-http://localhost}
        NEXT_PUBLIC_NOTIFICATION_SERVICE_URL: ${NEXT_PUBLIC_NOTIFICATION_SERVICE_URL:-http://localhost}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changemechangemechangemechangemechangeme}
    container_name: ecommerce_frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - ecommerce
    restart: always

  # ───────────────────────────────────────────────────────────────────────────
  # API Gateway (NGINX)
  # ───────────────────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    container_name: ecommerce_gateway
    environment:
      PORT: "80"
      USER_SERVICE_URL: "http://user-service:8000"
      PRODUCT_SERVICE_URL: "http://product-catalog-service:8002"
      CART_SERVICE_URL: "http://shopping-cart-service:8003"
      ORDER_SERVICE_URL: "http://order-service:8004"
      PAYMENT_SERVICE_URL: "http://payment-service:8005"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8006"
    ports:
      - "80:80"
    depends_on:
      - user-service
      - product-catalog-service
      - shopping-cart-service
      - order-service
      - payment-service
      - notification-service
    networks:
      - ecommerce
    restart: always

