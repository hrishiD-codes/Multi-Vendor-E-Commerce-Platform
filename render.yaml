services:
  # ───────────────────────────────────────────────────────────────────────────
  # API Gateway (Public Entry Point)
  # ───────────────────────────────────────────────────────────────────────────
  - type: web
    name: api-gateway
    runtime: docker
    dockerfilePath: backend/api-gateway/Dockerfile
    dockerContext: ./backend/api-gateway
    plan: free
    healthCheckPath: /health
    envVars:
      # Render injects PORT=10000 automatically — do NOT override it here
      # Nginx will listen on $PORT via envsubst in the startup script
      - key: USER_SERVICE_URL
        value: "https://user-service-mcpt.onrender.com"
      - key: PRODUCT_SERVICE_URL
        value: "https://product-catalog-service-ok51.onrender.com"
      - key: CART_SERVICE_URL
        value: "https://shopping-cart-service-tmz6.onrender.com"
      - key: ORDER_SERVICE_URL
        value: "https://order-service-qsy5.onrender.com"
      - key: PAYMENT_SERVICE_URL
        value: "https://payment-service-4iuw.onrender.com"
      - key: NOTIFICATION_SERVICE_URL
        value: "https://notification-service-fwil.onrender.com"

  # ───────────────────────────────────────────────────────────────────────────
  # Backend Microservices (Private Services)
  # ───────────────────────────────────────────────────────────────────────────
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: backend/services/user-service/Dockerfile
    dockerContext: ./backend/services/user-service
    plan: free
    healthCheckPath: /api/health
    envVars:
      # PORT is injected by Render automatically (10000) — do NOT set it here
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: ""
      - key: DB_DATABASE
        value: ""
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""
      - key: APP_URL
        value: ""
      - key: FRONTEND_URL
        value: https://squaremart.vercel.app

  - type: web
    name: product-catalog-service
    runtime: docker
    dockerfilePath: backend/services/product-catalog-service/Dockerfile
    dockerContext: ./backend/services/product-catalog-service
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: ""
      - key: DB_DATABASE
        value: ""
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""
      - key: APP_URL
        value: ""

  - type: web
    name: shopping-cart-service
    runtime: docker
    dockerfilePath: backend/services/shopping-cart-service/Dockerfile
    dockerContext: ./backend/services/shopping-cart-service
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: ""
      - key: DB_DATABASE
        value: ""
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""
      - key: APP_URL
        value: ""
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: ecommerce-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: ecommerce-redis
          property: port

  - type: web
    name: order-service
    runtime: docker
    dockerfilePath: backend/services/order-service/Dockerfile
    dockerContext: ./backend/services/order-service
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: ""
      - key: DB_DATABASE
        value: ""
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""
      - key: APP_URL
        value: ""

  - type: web
    name: payment-service
    runtime: docker
    dockerfilePath: backend/services/payment-service/Dockerfile
    dockerContext: ./backend/services/payment-service
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: ""
      - key: DB_DATABASE
        value: ""
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""
      - key: APP_URL
        value: ""

  - type: web
    name: notification-service
    runtime: docker
    dockerfilePath: backend/services/notification-service/Dockerfile
    dockerContext: ./backend/services/notification-service
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        value: ""
      - key: DB_PORT
        value: ""
      - key: DB_DATABASE
        value: ""
      - key: DB_USERNAME
        value: ""
      - key: DB_PASSWORD
        value: ""
      - key: APP_URL
        value: ""

  # ───────────────────────────────────────────────────────────────────────────
  # Shared Infrastructure (Managed Redis)
  # ───────────────────────────────────────────────────────────────────────────
  - type: keyvalue
    name: ecommerce-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all
