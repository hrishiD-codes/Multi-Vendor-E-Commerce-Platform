services:
  # ───────────────────────────────────────────────────────────────────────────
  # API Gateway (Public Entry Point)
  # ───────────────────────────────────────────────────────────────────────────
  - type: web
    name: api-gateway
    runtime: docker
    dockerFilePath: ./backend/api-gateway/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 80

  # ───────────────────────────────────────────────────────────────────────────
  # Frontend (Next.js)
  # ───────────────────────────────────────────────────────────────────────────
  - type: web
    name: frontend
    runtime: docker
    dockerFilePath: ./frontend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NEXTAUTH_URL
        value: https://frontend.onrender.com # Placeholder, update after deployment
      - key: NEXT_PUBLIC_USER_SERVICE_URL
        fromService:
          type: web
          name: api-gateway
          property: host
      - key: NEXT_PUBLIC_PRODUCT_SERVICE_URL
        fromService:
          type: web
          name: api-gateway
          property: host
      - key: NEXT_PUBLIC_CART_SERVICE_URL
        fromService:
          type: web
          name: api-gateway
          property: host
      - key: NEXT_PUBLIC_ORDER_SERVICE_URL
        fromService:
          type: web
          name: api-gateway
          property: host
      - key: NEXT_PUBLIC_PAYMENT_SERVICE_URL
        fromService:
          type: web
          name: api-gateway
          property: host

  # ───────────────────────────────────────────────────────────────────────────
  # Backend Microservices (Private Services)
  # ───────────────────────────────────────────────────────────────────────────
  - type: pserv
    name: user-service
    runtime: docker
    dockerFilePath: ./backend/services/user-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ecommerce-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecommerce-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ecommerce-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ecommerce-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecommerce-db
          property: password

  - type: pserv
    name: product-catalog-service
    runtime: docker
    dockerFilePath: ./backend/services/product-catalog-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ecommerce-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecommerce-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ecommerce-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ecommerce-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecommerce-db
          property: password

  - type: pserv
    name: shopping-cart-service
    runtime: docker
    dockerFilePath: ./backend/services/shopping-cart-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ecommerce-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecommerce-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ecommerce-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ecommerce-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecommerce-db
          property: password
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: ecommerce-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: ecommerce-redis
          property: port

  - type: pserv
    name: order-service
    runtime: docker
    dockerFilePath: ./backend/services/order-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ecommerce-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecommerce-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ecommerce-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ecommerce-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecommerce-db
          property: password

  - type: pserv
    name: payment-service
    runtime: docker
    dockerFilePath: ./backend/services/payment-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ecommerce-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecommerce-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ecommerce-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ecommerce-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecommerce-db
          property: password

  - type: pserv
    name: notification-service
    runtime: docker
    dockerFilePath: ./backend/services/notification-service/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: ecommerce-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ecommerce-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ecommerce-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ecommerce-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ecommerce-db
          property: password

  # ───────────────────────────────────────────────────────────────────────────
  # Shared Infrastructure (Managed Redis)
  # ───────────────────────────────────────────────────────────────────────────
  - type: keyvalue
    name: ecommerce-redis
    plan: free

# ─────────────────────────────────────────────────────────────────────────────
# Managed PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────
databases:
  - name: ecommerce-db
    plan: free
